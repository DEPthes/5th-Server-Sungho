<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 목록</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f6fa; color: #333; }
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        h1 { font-size: 28px; margin-bottom: 24px; color: #2c3e50; }
        .btn {
            display: inline-block; padding: 10px 20px; border-radius: 6px;
            text-decoration: none; font-size: 14px; cursor: pointer; border: none;
        }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-primary:hover { background: #2980b9; }
        table { width: 100%; border-collapse: collapse; background: #fff;
                border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
        thead { background: #2c3e50; color: #fff; }
        th, td { padding: 14px 16px; text-align: left; }
        tbody tr:hover { background: #f0f4f8; }
        tbody tr { border-bottom: 1px solid #e9ecef; }
        td a { color: #3498db; text-decoration: none; }
        td a:hover { text-decoration: underline; }
        .empty { text-align: center; padding: 40px; color: #888; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-row">
        <h1>게시글 목록</h1>
        <a th:href="@{/posts/new}" class="btn btn-primary">글쓰기</a>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width:60px">번호</th>
                <th>제목</th>
                <th style="width:100px">작성자</th>
                <th style="width:140px">작성일</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(posts)}">
                <td colspan="4" class="empty">작성된 게시글이 없습니다.</td>
            </tr>
            <tr th:each="post : ${posts}">
                <td th:text="${post.id}"></td>
                <td><a th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.title}"></a></td>
                <td th:text="${post.author}"></td>
                <td th:text="${post.createdAt}"></td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
